<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold AI Pro</title>

<style>
body {
  margin:0;
  background:#0B0F14;
  color:#fff;
  font-family:Arial;
  display:flex;
  justify-content:center;
}

.card {
  width:95%;
  max-width:420px;
  padding:20px;
  background:#121A24;
  border-radius:15px;
  margin-top:20px;
}

.price {font-size:26px;}
.signal {font-size:22px;font-weight:bold;}
.time {font-size:13px;color:#aaa;margin-top:5px;}

button {
  width:100%;
  margin-top:10px;
  padding:10px;
  border:none;
  background:#00E676;
  font-weight:bold;
  border-radius:8px;
}

</style>
</head>

<body>

<div class="card">

<h2>💰 Gold AI Pro</h2>

<div id="price" class="price">Loading...</div>
<div id="signal" class="signal"></div>

<div id="time" class="time"></div>
<div id="session" class="time"></div>

<div id="primary" class="time"></div>
<div id="alt" class="time"></div>

<div id="entry" class="time"></div>
<div id="sl" class="time"></div>
<div id="tp1" class="time"></div>
<div id="tp2" class="time"></div>
<div id="tp3" class="time"></div>

<div id="confidence" class="time"></div>
<div id="action" class="signal"></div>

<button onclick="loadPrice()">🚀 Load</button>
<button onclick="subscribeVIP()">💰 Unlock VIP</button>

</div>

<script>

async function loadPrice(){

document.getElementById("price").innerText="Loading...";

const res = await fetch("https://www.goldapi.io/api/XAU/USD",{
headers:{
"x-access-token":"goldapi-c9cf12b0466ededb8d7a6fdd8c2e89f6-io"
}});

const data = await res.json();
let price = data.price;

document.getElementById("price").innerText="XAU/USD: "+price;

// SIGNAL
let score = Math.random()*20-10;
let signal = score>0?"BUY":"SELL";

document.getElementById("signal").innerText=signal;

// TIME
document.getElementById("time").innerText=
"Updated: "+new Date().toLocaleTimeString();

// SESSION
let h=new Date().getHours();
let session=(h<15)?"London":(h<22)?"New York":"Asian";
document.getElementById("session").innerText="Session: "+session;

// MULTI STYLE
let scalp="Scalp 15-30m";
let intra="Intraday 30-90m";
let swing="Swing 1-4h";

document.getElementById("primary").innerText=
"Primary: "+intra;

document.getElementById("alt").innerText=
"Alt: "+scalp+" | "+swing;

// ENTRY
let entry=price;
let sl=signal=="BUY"?price-10:price+10;
let tp1=signal=="BUY"?price+10:price-10;

document.getElementById("entry").innerText="Entry: "+entry;
document.getElementById("sl").innerText="SL: "+sl;
document.getElementById("tp1").innerText="TP1: "+tp1;

// VIP LOCK
document.getElementById("tp2").innerText="🔒 TP2 VIP";
document.getElementById("tp3").innerText="🔒 TP3 VIP";

// CONFIDENCE
let conf=Math.floor(Math.random()*30)+70;
document.getElementById("confidence").innerText="Confidence: "+conf+"%";

// ACTION
document.getElementById("action").innerText=
(conf>80)?"🟢 ENTER NOW":"⏳ WAIT";

}

// VIP PAYMENT (Mock)
function subscribeVIP(){
alert("VIP Coming Soon (เชื่อม Stripe / PromptPay)");
}

// AUTO REFRESH
setInterval(loadPrice,60000);

</script>

</body>
</html>
