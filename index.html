<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gold AI Pro</title>

<style>
body {margin:0;background:#0B0F14;color:#fff;font-family:Arial;display:flex;justify-content:center;}
.card {width:95%;max-width:420px;padding:20px;background:#121A24;border-radius:15px;margin-top:20px;}
.price {font-size:26px;}
.signal {font-size:22px;font-weight:bold;}
.time {font-size:13px;color:#aaa;margin-top:5px;}
button {width:100%;margin-top:8px;padding:10px;border:none;background:#1f2937;color:white;border-radius:8px;}
.active {background:#00E676;color:black;}
.main-btn {background:#00E676;color:black;font-weight:bold;}
</style>
</head>

<body>

<div class="card">
<h2>💰 Gold AI Pro</h2>

<div id="price" class="price">Loading...</div>
<div id="signal" class="signal"></div>

<div id="time" class="time"></div>
<div id="session" class="time"></div>

<div id="tradestyle" class="time"></div>
<div id="selectedStyle" class="time"></div>

<div id="entry" class="time"></div>
<div id="sl" class="time"></div>
<div id="tp1" class="time"></div>
<div id="tp2" class="time"></div>
<div id="tp3" class="time"></div>

<div id="confidence" class="time"></div>
<div id="action" class="signal"></div>

<button id="btnScalp" onclick="setStyle('scalp')">⚡ Scalp</button>
<button id="btnIntra" onclick="setStyle('intra')">📊 Intraday</button>
<button id="btnSwing" onclick="setStyle('swing')">📈 Swing</button>

<button class="main-btn" onclick="loadPrice()">🚀 Load Signal</button>
</div>

<script>

// 👉 ใส่ Worker URL ตรงนี้
const API_URL = "https://YOUR-WORKER-URL";

let currentStyle="intra";

function setStyle(style){
  currentStyle=style;
  document.getElementById("selectedStyle").innerText="Selected: "+style;

  btnScalp.classList.remove("active");
  btnIntra.classList.remove("active");
  btnSwing.classList.remove("active");

  if(style==="scalp") btnScalp.classList.add("active");
  if(style==="intra") btnIntra.classList.add("active");
  if(style==="swing") btnSwing.classList.add("active");
}

async function loadPrice(){

try{
const res=await fetch(API_URL);
const data=await res.json();

let price=data.price;

priceEl.innerText="XAU/USD: "+price;

// SIGNAL
let signal=Math.random()>0.5?"BUY":"SELL";
signalEl.innerText=signal;

// TIME
time.innerText="Updated: "+new Date().toLocaleTimeString();

// SESSION
let h=new Date().getHours();
session.innerText=(h<15)?"London":(h<22)?"New York":"Asian";

// STYLE
let hold=(currentStyle==="scalp")?"15-30m":(currentStyle==="intra")?"30-90m":"1-4h";
tradestyle.innerText=currentStyle+" | "+hold;

// ENTRY
let sl,tp1;

if(currentStyle==="scalp"){
sl=signal==="BUY"?price-5:price+5;
tp1=signal==="BUY"?price+5:price-5;
}
if(currentStyle==="intra"){
sl=signal==="BUY"?price-10:price+10;
tp1=signal==="BUY"?price+10:price-10;
}
if(currentStyle==="swing"){
sl=signal==="BUY"?price-20:price+20;
tp1=signal==="BUY"?price+20:price-20;
}

entry.innerText="Entry: "+price.toFixed(2);
slEl.innerText="SL: "+sl.toFixed(2);
tp1El.innerText="TP1: "+tp1.toFixed(2);

tp2.innerText="🔒 VIP";
tp3.innerText="🔒 VIP";

// CONF
let c=Math.floor(Math.random()*30)+70;
confidence.innerText="Confidence: "+c+"%";

// ACTION
action.innerText=(c>80)?"ENTER NOW":"WAIT";

}catch{
priceEl.innerText="Error";
}
}

// FIX ELEMENT
const priceEl=document.getElementById("price");
const signalEl=document.getElementById("signal");
const time=document.getElementById("time");
const session=document.getElementById("session");
const tradestyle=document.getElementById("tradestyle");
const entry=document.getElementById("entry");
const slEl=document.getElementById("sl");
const tp1El=document.getElementById("tp1");
const tp2=document.getElementById("tp2");
const tp3=document.getElementById("tp3");
const confidence=document.getElementById("confidence");
const action=document.getElementById("action");

// AUTO
setInterval(loadPrice,60000);
setStyle("intra");

</script>

</body>
</html>
