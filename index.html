<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold AI Pro</title>

<style>
body {
  margin:0;
  background:#0B0F14;
  color:white;
  font-family:Arial;
  padding:10px;
}

.card {
  max-width:420px;
  margin:auto;
  background:#121A24;
  border-radius:18px;
  padding:15px;
}

.title {
  font-size:20px;
  font-weight:bold;
}

.price {
  font-size:28px;
  margin-top:10px;
}

.signal {
  font-size:22px;
  font-weight:bold;
}

.buy {color:#00E676;}
.sell {color:#FF5252;}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.box {
  background:#1f2937;
  padding:8px;
  border-radius:10px;
  font-size:13px;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.main {background:#00E676;color:black;}
.chart-btn {background:#1f2937;color:white;}
.setting {background:#FFD700;color:black;}

.chart {
  display:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<div class="title">💰 Gold AI Pro</div>

<div id="price" class="price">Loading...</div>
<div id="signal" class="signal"></div>

<div class="grid">
  <div class="box" id="entry"></div>
  <div class="box" id="sl"></div>
  <div class="box" id="tp1"></div>
  <div class="box" id="confidence"></div>
  <div class="box" id="session"></div>
  <div class="box" id="action"></div>
</div>

<button class="main" onclick="loadPrice()">🚀 Load Signal</button>
<button class="chart-btn" onclick="toggleChart()">📊 Chart</button>
<button class="setting" onclick="alert('Setting coming soon')">⚙️ Setting</button>

<div id="chart" class="chart">
<iframe src="https://www.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=15&theme=dark" width="100%" height="300"></iframe>
</div>

</div>

<script>

const API_URL = "https://white-fog-ba70.porapat-su1975.workers.dev/";

async function loadPrice(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    let p = data.price;
    let signal = Math.random()>0.5?"BUY":"SELL";

    document.getElementById("price").innerText = "XAU/USD: "+p.toFixed(2);

    let sigEl = document.getElementById("signal");
    sigEl.innerText = signal;
    sigEl.className = "signal " + (signal==="BUY"?"buy":"sell");

    document.getElementById("entry").innerText = "Entry: "+p.toFixed(2);
    document.getElementById("sl").innerText = "SL: "+(signal==="BUY"?p-10:p+10).toFixed(2);
    document.getElementById("tp1").innerText = "TP1: "+(signal==="BUY"?p+10:p-10).toFixed(2);

    let confidence = Math.floor(Math.random()*30)+70;
    document.getElementById("confidence").innerText = "Confidence: "+confidence+"%";

    let hour = new Date().getHours();
    let session = hour<15?"London":hour<22?"New York":"Asia";
    document.getElementById("session").innerText = "Session: "+session;

    let action = confidence>80?"ENTER NOW":"WAIT";
    document.getElementById("action").innerText = "Action: "+action;

  }catch{
    document.getElementById("price").innerText = "Error";
  }
}

function toggleChart(){
  let c = document.getElementById("chart");
  c.style.display = c.style.display==="none"?"block":"none";
}

</script>

</body>
</html>
