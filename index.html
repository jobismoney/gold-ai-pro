<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gold AI Pro</title>

<style>
body {
  margin: 0;
  background: linear-gradient(180deg, #0B0F14, #111827);
  color: #fff;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.card {
  background: #121A24;
  padding: 20px;
  border-radius: 16px;
  width: 95%;
  max-width: 400px;
  text-align: center;
}

.price { font-size: 26px; margin: 10px 0; }
.signal { font-size: 22px; font-weight: bold; }

.buy { color: #00E676; }
.sell { color: #FF5252; }

.time { font-size: 13px; color: #aaa; margin-top: 5px; }

button {
  margin-top: 10px;
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #00E676;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

@media (min-width: 768px) {
  .card {
    max-width: 600px;
  }
}
</style>
</head>

<body>

<div class="card">
  <h2>💰 Gold AI Pro</h2>

  <div id="price" class="price">Loading...</div>
  <div id="signal" class="signal">WAIT</div>

  <div id="time" class="time"></div>
  <div id="expected" class="time"></div>
  <div id="session" class="time"></div>

  <div id="tradestyle" class="time"></div>
  <div id="timing" class="time"></div>

  <div id="confidence" class="time"></div>
  <div id="winrate" class="time"></div>

  <div id="action" class="signal"></div>

  <div id="entry" class="time"></div>
  <div id="sl" class="time"></div>
  <div id="tp1" class="time"></div>
  <div id="tp2" class="time"></div>
  <div id="tp3" class="time"></div>

  <div id="vip" class="time"></div>

  <div style="margin-top:10px;">
    <a href="https://www.forexfactory.com/calendar" target="_blank" style="color:#00E676;">
      📰 View Market News
    </a>
  </div>

  <button onclick="loadPrice()">🚀 Load Price</button>
  <button onclick="toggleChart()">📊 View Chart</button>

  <div id="chartBox" style="display:none; margin-top:20px;">
    <iframe 
      src="https://www.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=15&theme=dark"
      width="100%" height="300" frameborder="0">
    </iframe>
  </div>
</div>

<script>

async function loadPrice() {

  document.getElementById("price").innerText = "Loading...";
  document.getElementById("signal").innerText = "Analyzing...";

  try {
    const res = await fetch("https://www.goldapi.io/api/XAU/USD", {
      headers: { "x-access-token": "goldapi-c9cf12b0466ededb8d7a6fdd8c2e89f6-io" }
    });

    const data = await res.json();
    let price = data.price;

    document.getElementById("price").innerText = "XAU/USD: " + price;

    // ===== SIGNAL =====
    let score = Math.random() * 20 - 10;
    let signal = "WAIT";

    if (score >= 7) signal = "🔥 STRONG BUY";
    else if (score <= -7) signal = "🔻 STRONG SELL";

    let signalEl = document.getElementById("signal");
    signalEl.innerText = signal;
    signalEl.className = "signal " + (signal.includes("BUY") ? "buy" : "sell");

    // ===== TIME =====
    document.getElementById("time").innerText =
    "Updated: " + new Date().toLocaleTimeString();

    let randomVol = Math.random();
    let timeEstimate = "30–60 นาที";

    if (randomVol > 0.7) timeEstimate = "15–30 นาที";
    else if (randomVol < 0.3) timeEstimate = "1–2 ชั่วโมง";

    document.getElementById("expected").innerText =
    "⏱ Expected Move: " + timeEstimate;

    // ===== SESSION =====
    let hour = new Date().getHours();
    let session = "";

    if (hour >= 7 && hour < 15) session = "🌍 London Session";
    else if (hour >= 15 && hour < 22) session = "🌍 New York Session";
    else session = "🌏 Asian Session";

    let sessionBias = "";

    if (session.includes("London")) sessionBias = " (Bullish)";
    else if (session.includes("New York")) sessionBias = " (Volatile)";
    else sessionBias = " (Slow)";

    document.getElementById("session").innerText =
    session + sessionBias;

    // ===== TRADE STYLE =====
    let style = "";
    let holding = "";

    if (randomVol > 0.7) {
      style = "Scalp";
      holding = "15–30 mins";
    } else if (randomVol < 0.3) {
      style = "Swing";
      holding = "1–4 hours";
    } else {
      style = "Intraday";
      holding = "30–90 mins";
    }

    let timing = session.includes("London") ? "Best Entry: London Open" : "Wait Setup";

    document.getElementById("tradestyle").innerText =
    "⏱ Style: " + style + " | Holding: " + holding;

    document.getElementById("timing").innerText =
    "🎯 " + timing;

    // ===== CONFIDENCE =====
    let confidence = Math.floor(Math.random() * 30) + 70;
    document.getElementById("confidence").innerText =
    "Confidence: " + confidence + "%";

    // ===== WIN RATE =====
    let winrate = Math.floor(Math.random() * 15) + 60;
    document.getElementById("winrate").innerText =
    "Win Rate: " + winrate + "%";

    // ===== ACTION =====
    let action = "";

    if (confidence > 80 && signal.includes("BUY")) {
      action = "🟢 ENTER NOW";
    } else {
      action = "⏳ WAIT";
    }

    document.getElementById("action").innerText = action;

    // ===== ENTRY / TP / SL =====
    let entry = price;
    let sl, tp1;

    if (signal.includes("BUY")) {
      sl = price - 10;
      tp1 = price + 10;
    } else {
      sl = price + 10;
      tp1 = price - 10;
    }

    document.getElementById("entry").innerText = "🎯 Entry: " + entry.toFixed(2);
    document.getElementById("sl").innerText = "🛑 SL: " + sl.toFixed(2);
    document.getElementById("tp1").innerText = "💰 TP1: " + tp1.toFixed(2);

    document.getElementById("tp2").innerText = "🔒 TP2 (VIP)";
    document.getElementById("tp3").innerText = "🔒 TP3 (VIP)";

    document.getElementById("vip").innerText =
    "🔓 Unlock VIP for Full Targets";

  } catch (e) {
    document.getElementById("price").innerText = "Error loading price";
  }
}

// ===== CHART =====
function toggleChart() {
  let chart = document.getElementById("chartBox");

  if (chart.style.display === "none") {
    chart.style.display = "block";
  } else {
    chart.style.display = "none";
  }
}

// ===== AUTO REFRESH =====
setInterval(loadPrice, 60000);

</script>

</body>
</html>
