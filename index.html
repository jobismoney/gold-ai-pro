<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gold AI Pro</title>

<style>
body {margin:0;background:#0B0F14;color:#fff;font-family:Arial;padding:10px}
.card {max-width:420px;margin:auto;background:#121A24;border-radius:15px;padding:15px}
.price {font-size:28px}
.signal {font-size:22px;font-weight:bold}
button {width:100%;margin-top:8px;padding:10px;border:none;background:#1f2937;color:white;border-radius:8px}
.main {background:#00E676;color:black}
.chart {display:none;margin-top:10px}
</style>
</head>

<body>

<div class="card">
<h2>💰 Gold AI Pro</h2>

<div id="price" class="price">Loading...</div>
<div id="signal" class="signal"></div>

<div id="entry"></div>
<div id="sl"></div>
<div id="tp1"></div>

<button onclick="loadPrice()" class="main">🚀 Load Signal</button>
<button onclick="toggleChart()">📊 Chart</button>

<div id="chart" class="chart">
<iframe src="https://www.tradingview.com/widgetembed/?symbol=OANDA:XAUUSD&interval=15&theme=dark" width="100%" height="300"></iframe>
</div>

</div>

<script>

const API_URL = "https://white-fog-ba70.porapat-su1975.workers.dev/";

async function loadPrice(){
  try{
    const res = await fetch(API_URL);
    const data = await res.json();

    let p = data.price;
    let signal = Math.random()>0.5?"BUY":"SELL";

    document.getElementById("price").innerText = "XAU/USD: "+p.toFixed(2);
    document.getElementById("signal").innerText = signal;

    document.getElementById("entry").innerText = "Entry: "+p.toFixed(2);
    document.getElementById("sl").innerText = "SL: "+(signal==="BUY"?p-10:p+10).toFixed(2);
    document.getElementById("tp1").innerText = "TP1: "+(signal==="BUY"?p+10:p-10).toFixed(2);

  }catch{
    document.getElementById("price").innerText = "Error";
  }
}

function toggleChart(){
  let c = document.getElementById("chart");
  c.style.display = c.style.display==="none"?"block":"none";
}

</script>

</body>
</html>
