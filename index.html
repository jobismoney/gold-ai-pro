<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<style>
body{background:#0b0f14;color:#fff;font-family:sans-serif;text-align:center}
.card{background:#121a24;padding:20px;border-radius:15px;margin:20px}
.buy{color:#00e676}
.sell{color:#ff5252}
.wait{color:#ffd54f}
button{padding:15px;margin:10px;border:none;border-radius:10px}
</style>
</head>

<body>

<div class="card">

<h2>💰 Gold AI</h2>

<div id="status"></div>
<h1 id="price">--</h1>
<h2 id="signal">--</h2>

<p id="entry"></p>
<p id="tp1"></p>
<p id="tp2">🔒 VIP</p>
<p id="tp3">🔒 VIP</p>

<button onclick="load()">🚀 Load</button>
<button onclick="vip()">💎 VIP</button>

</div>

<script>

const API="https://white-fog-ba70.porapat-su1975.workers.dev/";

let isVip = localStorage.getItem("vip")==="true";

function vip(){
  let code = prompt("ใส่ VIP code");
  if(code==="VIP123"){
    localStorage.setItem("vip","true");
    isVip=true;
    alert("VIP unlocked");
  }
}

async function load(){

  const res = await fetch(API+"?vip=true&min_conf=70&cooldown=15");
  const d = await res.json();

  if(d.market==="closed"){
    document.getElementById("status").innerText="Market Closed";
    return;
  }

  document.getElementById("status").innerText="Market Open";
  document.getElementById("price").innerText="XAU/USD "+d.price;

  let sig = document.getElementById("signal");
  sig.innerText=d.signal.signal;
  sig.className=d.signal.signal.toLowerCase();

  document.getElementById("entry").innerText="Entry "+d.signal.entry;
  document.getElementById("tp1").innerText="TP1 "+d.signal.tp1;

  if(isVip){
    document.getElementById("tp2").innerText="TP2 "+d.signal.tp2;
    document.getElementById("tp3").innerText="TP3 "+d.signal.tp3;
  }

}

</script>

</body>
</html>
